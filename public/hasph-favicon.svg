<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White rounded-square background matching brand guide app icon -->
  <rect width="512" height="512" rx="112" fill="#FFFFFF"/>

  <defs>
    <!-- Blue-to-cyan gradient matching Hasph brand guide -->
    <linearGradient id="pg" x1="140" y1="90" x2="380" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1D4ED8"/>
      <stop offset="50%"  stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Bowl / Ring — the circular part of the "p" -->
  <circle
    cx="256" cy="208" r="102"
    stroke="url(#pg)"
    stroke-width="58"
    fill="none"
  />

  <!-- Stem / Descender — drops below the ring -->
  <rect
    x="227" y="268"
    width="58" height="168"
    rx="29"
    fill="url(#pg)"
  />
</svg>
